<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <title>FerreSystem — Plataforma ERP-agnóstica multi-tenant para comercio y servicios en Chile</title>
  <meta name="description" content="FerreSystem conecta cualquier ERP con dashboards modernos. Multi-tenant, white-label, ERP-agnóstico. JustWeb, Transtecnia, Rex+, Buk, Excel. Listo en días.">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0b0d14;
      color: #e8eaf0;
      line-height: 1.6;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; font: inherit; border: none; background: none; }

    :root {
      --negro:   #0b0d14;
      --navy:    #0f1420;
      --rojo:    #c0392b;
      --rojo-h:  #a93226;
      --rojo-s:  rgba(192,57,43,0.13);
      --rojo-g:  linear-gradient(135deg,#e74c3c,#922b21);
      --blanco:  #ffffff;
      --gris-1:  #141824;
      --gris-2:  #1c2132;
      --gris-3:  #252c40;
      --texto:   #e8eaf0;
      --muted:   #7a849a;
      --borde:   rgba(255,255,255,0.07);
      --r:       12px;
      --sombra:  0 8px 32px rgba(0,0,0,0.5);
    }

    /* ── CANVAS NODOS ─────────────────────────────────── */
    #canvas-bg {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
      opacity: 0.45;
    }

    /* ── ANIMACIONES ──────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }
    @keyframes pulse-dot {
      0%,100% { transform: scale(1); opacity:1; }
      50%      { transform: scale(1.6); opacity:.6; }
    }
    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .reveal.visible { opacity: 1; transform: none; }
    .reveal.d1 { transition-delay: 0.05s; }
    .reveal.d2 { transition-delay: 0.15s; }
    .reveal.d3 { transition-delay: 0.25s; }
    .reveal.d4 { transition-delay: 0.38s; }
    .reveal.d5 { transition-delay: 0.50s; }
    @media (prefers-reduced-motion: reduce) {
      .reveal { opacity:1; transform:none; transition:none; }
      #canvas-bg { display:none; }
    }

    /* ── LAYOUT BASE ──────────────────────────────────── */
    .z1 { position: relative; z-index: 1; }
    .container { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; }
    section { padding: 6rem 1.5rem; position: relative; z-index: 1; }

    .section-eyebrow {
      display: inline-block;
      font-size: 0.72rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.18em;
      color: var(--rojo); margin-bottom: 0.75rem;
    }
    .section-title {
      font-size: clamp(1.8rem, 3.5vw, 2.8rem);
      font-weight: 900; line-height: 1.1;
      margin-bottom: 1rem; letter-spacing: -0.02em;
    }
    .section-sub {
      color: var(--muted); font-size: 1.05rem;
      max-width: 560px; margin-bottom: 3rem;
    }

    /* ── NAVBAR ───────────────────────────────────────── */
    nav {
      position: sticky; top: 0; z-index: 500;
      background: rgba(11,13,20,0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--borde);
    }
    .nav-inner {
      max-width: 1100px; margin: 0 auto;
      padding: 0.85rem 1.5rem;
      display: flex; align-items: center;
      justify-content: space-between; gap: 1.5rem;
    }
